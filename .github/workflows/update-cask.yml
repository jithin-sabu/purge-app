name: Update Homebrew cask

on:
  release:
    types: [published]

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Work out the version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download the DMG and hash it
        id: hash
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          URL="https://github.com/jithin-sabu/purge-app/releases/download/v${VERSION}/Purgev${VERSION}.dmg"
          curl -sL "$URL" -o purge.dmg
          echo "sha256=$(sha256sum purge.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Check out the tap
        uses: actions/checkout@v4
        with:
          repository: jithin-sabu/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update the cask
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          SHA="${{ steps.hash.outputs.sha256 }}"
          FILE="tap/Casks/purge.rb"
          sed -i "s/  version \".*\"/  version \"${VERSION}\"/" "$FILE"
          sed -i "s/  sha256 \".*\"/  sha256 \"${SHA}\"/" "$FILE"

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/purge.rb
          git commit -m "purge ${{ steps.v.outputs.version }}" || echo "Nothing to update"
          git push